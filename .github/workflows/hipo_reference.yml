# Produce the GEMC2 reference HIPO that gemc/clas12-systems (GEMC3) compares against
# with hipo-histos. clas12Tags is the source of truth: this publishes the LATEST
# reference (rolling release, never pinned) — clas12-systems plays catch-up.
#
# For each supported system the job runs gemc with the committed default gcard
# (the gun is taken from the gcard, unchanged) for n_events, and uploads the HIPO as
# an asset of the rolling `histo-reference` release. n_events is part of the matrix and
# is reported in the run metrics. DC uses 10,000 events.
name: HIPO Reference

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REFERENCE_TAG: histo-reference

concurrency:
  # Serialize so parallel matrix jobs do not race on the shared release.
  group: hipo-reference-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches: [ meson ]
    paths:
      - "experiments/clas12/dc/**"
      - ".github/workflows/hipo_reference.yml"
  schedule:
    # Nightly, so the reference tracks the latest clas12Tags even without DC changes.
    - cron: "17 3 * * *"

jobs:
  reference:
    name: Reference ${{ matrix.system }} (${{ matrix.n_events }} events)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gemc/clas12tags:dev-almalinux-10
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: dc
            gcard: experiments/clas12/dc/dc_text_default.gcard
            n_events: 10000
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        # Geometry (gcard + TEXT/CAD files) is taken from the image's installed
        # clas12Tags, so no LFS pull is needed here; this checkout is only for the
        # workflow context and provenance.
        with:
          fetch-depth: 1

      - name: Run GEMC2
        shell: bash
        run: |
          set -euo pipefail
          # GitHub `container:` steps do not run the image entrypoint, so SIM_HOME and the
          # gemc runtime are not set up (that is why ci/env.sh guessed an empty SIM_HOME).
          # Source the gemc base entrypoint (sets SIM_HOME + geant4) and add the installed
          # clas12Tags bin to PATH. gemc lives at $SIM_HOME/clas12Tags/dev/bin
          # (see clas12Tags ci/dockerfile_creator.py: install_gemc).
          export DOCKER_ENTRYPOINT_SOURCE_ONLY=1
          . /usr/local/bin/docker-entrypoint.sh
          if command -v module >/dev/null 2>&1; then
            module load geant4 2>/dev/null || true
          fi
          export PATH="$SIM_HOME/clas12Tags/dev/bin:$PATH"
          export GEMC_DATA_DIR="${GEMC_DATA_DIR:-$SIM_HOME/clas12Tags/dev}"
          # Transitional: the gemc executable now carries an install rpath ($ORIGIN/../lib) so
          # it finds its own libccdb.so — but the published image only picks that up after a
          # rebuild. Until then, locate libccdb.so and add it to the runtime path. This becomes
          # a redundant no-op once the rebuilt image ships the rpath, and can be removed then.
          ccdb_so="$(find "$SIM_HOME" -name 'libccdb.so*' -print -quit 2>/dev/null || true)"
          if [[ -n "$ccdb_so" ]]; then
            export LD_LIBRARY_PATH="$(dirname "$ccdb_so"):${LD_LIBRARY_PATH:-}"
            echo "Added ccdb lib dir to LD_LIBRARY_PATH: $(dirname "$ccdb_so")"
          fi
          command -v gemc >/dev/null || { echo "ERROR: gemc not found in image" >&2; exit 1; }
          gemc -v 2>&1 | tee "$GITHUB_WORKSPACE/gemc_version.txt" || true

          # Run from the image's installed clas12Tags so the gcard's TEXT/CAD geometry
          # resolves consistently. Gun comes from the committed gcard; only override event
          # count and output. Write the HIPO to the workspace for the release upload.
          out="$GITHUB_WORKSPACE/${{ matrix.system }}_reference.hipo"
          cd "$GEMC_DATA_DIR"
          gemc \
            -USE_GUI=0 \
            -N=${{ matrix.n_events }} \
            -OUTPUT="hipo, $out" \
            ${{ matrix.gcard }}
          ls -l "$out"

      - name: Write provenance sidecar
        shell: bash
        run: |
          {
            echo "source: ${GITHUB_REPOSITORY}@${GITHUB_SHA} (${GITHUB_REF_NAME})"
            echo "date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "system: ${{ matrix.system }}"
            echo "n_events: ${{ matrix.n_events }}"
            echo "gcard: ${{ matrix.gcard }}"
            echo "image: ghcr.io/gemc/clas12tags:dev-almalinux-10 (geometry from image install)"
            echo "gemc: $(head -n1 gemc_version.txt 2>/dev/null || echo unknown)"
          } > "${{ matrix.system }}_reference.txt"
          cat "${{ matrix.system }}_reference.txt"

      - name: Metrics summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "### HIPO Reference — ${{ matrix.system }}"
            echo
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| System | ${{ matrix.system }} |"
            echo "| Events simulated | ${{ matrix.n_events }} |"
            echo "| Source commit | ${GITHUB_SHA} |"
            echo "| gcard | ${{ matrix.gcard }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish rolling reference release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.REFERENCE_TAG }}
          name: HIPO comparison reference (rolling)
          body: |
            Rolling GEMC2 reference HIPO files for hipo-histos comparison in gemc/clas12-systems.
            Always the latest clas12Tags output; assets are overwritten on each run.
          prerelease: true
          files: |
            ${{ matrix.system }}_reference.hipo
            ${{ matrix.system }}_reference.txt
