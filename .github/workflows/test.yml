name: Test

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: gemc-test-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "**/*.md"

  merge_group:
  push:
    branches: [ meson ]
    paths-ignore:
      - "**/*.md"

jobs:
  discover:
    name: Create job matrix
    runs-on: ubuntu-latest
    outputs:
      matrix_build: ${{ steps.scan.outputs.matrix_build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: scan
        name: Build matrix
        shell: bash
        run: |
          set -euo pipefail
          ./ci/distros_tags.sh

      - name: Fail if matrix is empty
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ steps.scan.outputs.matrix_build }}" ]]; then
            echo "matrix_build output is empty. Check ci/distros_tags.sh writing to GITHUB_OUTPUT."
            exit 1
          fi

      - name: Show matrix (debug)
        shell: bash
        run: |
          echo '${{ steps.scan.outputs.matrix_build }}'

  build:
    name: ${{ matrix.image }}/${{ matrix.image_tag }} ${{ matrix.arch }}
    needs: [ discover ]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix_build) }}
    container: ${{ matrix.container }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Git LFS
        shell: bash
        run: |
          set -euo pipefail
          if command -v git-lfs >/dev/null 2>&1; then
            git lfs install --system
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends git-lfs
          elif command -v dnf >/dev/null 2>&1; then
            dnf -y install git-lfs || (dnf -y install epel-release && dnf -y install git-lfs)
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Syu --noconfirm
            pacman -S --noconfirm --needed git-lfs
          else
            echo "No supported package manager found to install git-lfs." >&2
            exit 1
          fi
          git lfs install --system

      - name: Install JDK 21
        shell: bash
        run: |
          set -euo pipefail

          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends openjdk-21-jdk
          elif command -v dnf >/dev/null 2>&1; then
            dnf -y install java-21-openjdk-devel || dnf -y install java-latest-openjdk-devel
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Syu --noconfirm
            pacman -S --noconfirm --needed jdk21-openjdk
          else
            echo "No supported package manager found to install JDK 21." >&2
            exit 1
          fi

          JAVA_HOME="$(dirname "$(dirname "$(readlink -f "$(command -v javac)")")")"
          echo "JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
          echo "$JAVA_HOME/bin" >> "$GITHUB_PATH"
          java -version
          javac -version
          printf 'class JdkCheck {}\n' > /tmp/JdkCheck.java
          javac --release 21 /tmp/JdkCheck.java
          rm -f /tmp/JdkCheck.java /tmp/JdkCheck.class

      - name: Build and test
        shell: bash


        run: |
          set -euo pipefail
          export DOCKER_ENTRYPOINT_SOURCE_ONLY=1
          . /usr/local/bin/docker-entrypoint.sh
          module load geant4/"${{ matrix.geant4_tag || env.GEANT4_TAG }}"
          ./ci/build.sh

      - name: Create geometry
        shell: bash
        run: |
          set -euo pipefail
          export DOCKER_ENTRYPOINT_SOURCE_ONLY=1
          . /usr/local/bin/docker-entrypoint.sh
          module load geant4/"${{ matrix.geant4_tag || env.GEANT4_TAG }}"
          zsh -c '
            source ci/env.sh
            echo
            echo "Creating all geometry databases with: create_geometry.sh"
            echo START_CREATE_GEOMETRY $(date) | tee "$geo_log"
            ./create_geometry.sh 2>&1 | tee -a "$geo_log"
            pipeline_status=($pipestatus)
            if [[ ${pipeline_status[1]} -ne 0 || ${pipeline_status[2]} -ne 0 ]]; then
              fail_with_log "create_geometry failed. Log:" "$geo_log"
            fi
            ls -lrt | tee -a "$geo_log"
            echo
            echo "Changes after creation:"
            echo END_CREATE_GEOMETRY $(date) | tee -a "$geo_log"
            git branch
            git status -s >> "$geo_log"
            echo "Final experiments/clas12 content" >> "$geo_log"
            echo "Copying experiments ASCII DB and sqlite file to $ARTIFACT_DIR for CI"
            cp -r experiments clas12.sqlite geo_build.log geometry_source/build_coatjava.log "$ARTIFACT_DIR" ||
              fail_with_log "Copying geometry artifacts failed. Log:" "$geo_log"
          '

      - name: Pack logs
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          echo "LOG_TAR=" >> "$GITHUB_ENV"
          LOGROOT="/root/clas12Tags"
          OUTDIR="$GITHUB_WORKSPACE/_artifacts"
          TAR="logs-${{ matrix.gemc_tag }}-${{ matrix.image }}-${{ matrix.image_tag }}"
          TAR="${TAR}-${{ matrix.arch }}.tgz"
          if [[ -d "$LOGROOT/logs" ]]; then
            mkdir -p "$OUTDIR"
            tar -C "$LOGROOT" -czf "$OUTDIR/$TAR" logs
            echo "LOG_TAR=$OUTDIR/$TAR" >> "$GITHUB_ENV"
          else
            echo "No exported logs found at $LOGROOT/logs"
          fi

      - name: Upload logs
        if: ${{ always() && env.LOG_TAR != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: logs-${{ matrix.gemc_tag }}-${{ matrix.image }}-${{ matrix.image_tag }}-${{ matrix.arch }}
          path: ${{ env.LOG_TAR }}
          if-no-files-found: warn
          retention-days: 14

  final:
    name: Test - summary
    if: ${{ always() }}
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "### Some GEMC test jobs failed or were cancelled." >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Pass
        run: |
          echo "### GEMC test workflow passed." >> "$GITHUB_STEP_SUMMARY"
